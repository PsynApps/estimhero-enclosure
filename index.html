<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estim Hero enclosure pattern designer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
        --color-background-primary: #1a1a2e;
        --color-background-secondary: #16213e;
        --color-background-info: #0099ff;
        --color-text-primary: #e0e0e0;
        --color-text-secondary: #a0a0b0;
        --color-text-info: #ffffff;
        --color-border-secondary: #333355;
        --color-border-tertiary: #2a2a4a;
        --border-radius-md: 6px;
        --border-radius-lg: 10px;
      }
      body {
        font-family: var(--font-sans);
        background: #0f0f1a;
        color: var(--color-text-primary);
        min-height: 100vh;
      }
      #root {
        max-width: 960px;
        margin: 0 auto;
        padding: 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #fff;
      }
      .subtitle {
        font-size: 0.8rem;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
      }
      input[type="range"] {
        accent-color: var(--color-background-info);
      }
      input[type="checkbox"] {
        accent-color: var(--color-background-info);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
